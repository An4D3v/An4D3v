name: 🐍 Generate Snake Animation

on:
  # Roda a cada 12h pra manter a cobrinha atualizada
  schedule:
    - cron: "0 */12 * * *"
  # Permite rodar manualmente na aba Actions (botão "Run workflow")
  workflow_dispatch:
  # Roda também a cada push na main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gerar SVGs da cobrinha
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-purple.svg?color_snake=ffffff&color_dots=3d3d5c,7c3aed,9d6bff,b794f6,e9d5ff
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publicar na branch "output"
        run: |
          cd dist
          git init -b output
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "🐍 update snake animation"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push --force origin output
