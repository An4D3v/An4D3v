name: 🐍 Generate Snake Animation

on:
  # Roda a cada 12h pra manter a cobrinha atualizada
  schedule:
    - cron: "0 */12 * * *"
  # Permite rodar manualmente na aba Actions (botão "Run workflow")
  workflow_dispatch:
  # Roda também a cada push na main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Gerar SVGs da cobrinha
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-purple.svg?color_snake=ffffff&color_dots=3d3d5c,7c3aed,9d6bff,b794f6,e9d5ff
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publicar na branch "output"
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
